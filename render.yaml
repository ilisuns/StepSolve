services:
  - type: web
    name: stepsolve-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/src/main
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL`r`n        value: gpt-4.1-nano`r`n      - key: DATABASE_URL`r`n        value: file:./dev.db
